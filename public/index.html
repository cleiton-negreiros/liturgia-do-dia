<!DOCTYPE html>
<html lang="pt-BR" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liturgia do Dia</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#6B1A1A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Liturgia"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <meta name="description" content="A Palavra de Deus para cada dia — leituras da Santa Missa."/>

  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    /* ══ TEMA CLARO ══ */
    :root {
      --ouro:        #C8A96E;
      --ouro-claro:  #e8c98a;
      --vinho:       #6B1A1A;
      --vinho2:      #8B2222;
      --bg:          #FAF6EF;
      --bg-card:     #ffffff;
      --bg-bar:      #ffffff;
      --texto:       #2C2016;
      --cinza:       #7a6e64;
      --linha:       #e0d5c3;
      --aclamacao-bg:#fdf8f0;
    }

    /* ══ TEMA ESCURO ══ */
    [data-tema="escuro"] {
      --vinho:       #c05a52;
      --vinho2:      #d96a60;
      --bg:          #131110;
      --bg-card:     #1c1916;
      --bg-bar:      #181512;
      --texto:       #e6ddd0;
      --cinza:       #998e84;
      --linha:       #2c2620;
      --aclamacao-bg:#1b1712;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--texto);
      font-family: 'EB Garamond', serif;
      min-height: 100vh;
      transition: background .3s, color .3s;
    }

    /* ══ HEADER ══ */
    header {
      background: var(--vinho);
      padding: 2rem 1.5rem 1.4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: background .3s;
    }
    header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at top, var(--vinho2) 0%, var(--vinho) 70%);
      opacity: .65;
    }
    header::after {
      content: '✦';
      position: absolute;
      font-size: 18rem;
      color: rgba(200,169,110,0.05);
      top: -4rem; right: -3rem;
      line-height: 1; pointer-events: none;
    }
    .header-inner { position: relative; z-index: 1; }
    .site-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      color: var(--ouro);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .site-subtitle {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      color: rgba(255,255,255,.5);
      font-size: .78rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      margin-top: .3rem;
    }
    .ornamento { color: var(--ouro); font-size: 1.1rem; margin: .8rem 0 .3rem; opacity: .7; }

    /* ══ TOGGLE MODO ESCURO ══ */
    .toggle-tema {
      position: absolute;
      top: 1rem; right: 1.2rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: .45rem;
      cursor: pointer;
      user-select: none;
    }
    .toggle-label {
      font-family: 'Lato', sans-serif;
      font-size: .68rem;
      color: rgba(255,255,255,.55);
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .toggle-switch {
      width: 38px; height: 21px;
      background: rgba(255,255,255,.2);
      border-radius: 99px;
      position: relative;
      transition: background .3s;
      border: 1.5px solid rgba(255,255,255,.2);
      flex-shrink: 0;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 15px; height: 15px;
      background: #fff;
      border-radius: 50%;
      transition: transform .3s;
    }
    [data-tema="escuro"] .toggle-switch { background: var(--ouro); border-color: var(--ouro); }
    [data-tema="escuro"] .toggle-switch::after { transform: translateX(17px); }
    .toggle-icone { font-size: .95rem; }

    /* ══ BARRA DATA ══ */
    .data-bar {
      background: var(--bg-bar);
      border-bottom: 2px solid var(--linha);
      padding: .6rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .8rem;
      flex-wrap: wrap;
      transition: background .3s, border-color .3s;
    }
    .data-texto {
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      color: var(--vinho);
      letter-spacing: .07em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: opacity .2s;
    }
    .data-texto:hover { opacity: .7; }

    .nav-datas { display: flex; gap: .4rem; }
    .nav-datas button {
      background: none;
      border: 1.5px solid var(--linha);
      color: var(--cinza);
      font-family: 'Lato', sans-serif;
      font-size: .76rem;
      padding: .28rem .75rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .05em;
    }
    .nav-datas button:hover,
    .nav-datas button.ativo {
      background: var(--vinho);
      border-color: var(--vinho);
      color: #fff;
    }

    /* ══ MODAL CALENDÁRIO ══ */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.aberto { display: flex; }

    .modal-cal {
      background: var(--bg-card);
      border: 1px solid var(--linha);
      border-radius: 6px;
      padding: 1.4rem;
      width: min(370px, 94vw);
      box-shadow: 0 24px 70px rgba(0,0,0,.3);
      animation: popIn .22s ease;
      transition: background .3s, border-color .3s;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(.92) translateY(-8px); }
      to   { opacity:1; transform:scale(1)   translateY(0); }
    }

    .cal-topo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .9rem;
    }
    .cal-mes-ano {
      font-family: 'Cinzel', serif;
      font-size: .95rem;
      color: var(--vinho);
      letter-spacing: .06em;
    }
    .cal-nav { display: flex; gap: .3rem; }
    .cal-nav button {
      background: none;
      border: 1.5px solid var(--linha);
      color: var(--cinza);
      width: 28px; height: 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      transition: all .2s;
    }
    .cal-nav button:hover { background: var(--vinho); border-color: var(--vinho); color:#fff; }

    .cal-selects {
      display: flex; gap: .5rem; margin-bottom: .9rem;
    }
    .cal-selects select {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--linha);
      color: var(--texto);
      font-family: 'Lato', sans-serif;
      font-size: .8rem;
      padding: .28rem .4rem;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: background .3s, color .3s, border-color .3s;
    }
    .cal-selects select:focus { border-color: var(--vinho); }

    .cal-grid-header {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      margin-bottom: .35rem;
    }
    .cal-grid-header span {
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--cinza);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 2px;
    }
    .cal-dia {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      font-size: .8rem;
      border-radius: 50%;
      cursor: pointer;
      transition: background .15s, color .15s;
      color: var(--texto);
    }
    .cal-dia:hover:not(.vazio) { background: var(--linha); }
    .cal-dia.vazio { cursor: default; pointer-events: none; }
    .cal-dia.hoje  { background: var(--vinho); color: #fff; font-weight: 600; }
    .cal-dia.selecionado { background: var(--ouro); color: #1a1008; font-weight: 700; }
    .cal-dia.hoje.selecionado { background: var(--ouro); color: #1a1008; }

    .modal-fechar {
      display: block; width: 100%;
      margin-top: .9rem; padding: .45rem;
      background: none;
      border: 1.5px solid var(--linha);
      color: var(--cinza);
      font-family: 'Lato', sans-serif;
      font-size: .78rem; letter-spacing: .1em;
      border-radius: 2px; cursor: pointer;
      transition: all .2s;
    }
    .modal-fechar:hover { background: var(--vinho); border-color: var(--vinho); color: #fff; }

    /* ══ CONTEÚDO PRINCIPAL ══ */
    main { max-width: 780px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    .loading {
      text-align: center; padding: 4rem 1rem;
      color: var(--cinza); font-family: 'Lato', sans-serif;
    }
    .loading-icone {
      font-size: 2.5rem; display: block; margin-bottom: 1rem;
      animation: girar 2s linear infinite;
    }
    @keyframes girar { to { transform: rotate(360deg); } }

    .erro-box {
      background: var(--bg-card);
      border: 1.5px solid var(--linha);
      border-left: 4px solid #c0392b;
      padding: 1.5rem; border-radius: 4px; margin: 2rem 0;
    }
    .erro-box h3 { color: #c0392b; font-family: 'Cinzel', serif; margin-bottom: .5rem; }
    .erro-box p  { font-family: 'Lato', sans-serif; font-size: .9rem; color: var(--cinza); line-height: 1.6; }

    .tempo-badge {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--vinho); color: var(--ouro-claro);
      font-family: 'Lato', sans-serif; font-size: .72rem;
      letter-spacing: .18em; text-transform: uppercase;
      padding: .35rem .9rem; border-radius: 2px; margin-bottom: 1.8rem;
    }

    .leitura-card {
      border-left: 3px solid var(--ouro);
      padding: 1.6rem 0 1.6rem 1.6rem;
      margin-bottom: 2rem;
      animation: fadeUp .5s ease both;
    }
    .leitura-card + .leitura-card { border-top: 1px solid var(--linha); padding-top: 2rem; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .leitura-label {
      font-family: 'Lato', sans-serif; font-size: .68rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--cinza); margin-bottom: .3rem;
    }
    .leitura-referencia {
      font-family: 'Cinzel', serif; font-size: 1rem;
      color: var(--vinho); font-weight: 600; margin-bottom: 1rem;
    }
    .leitura-texto {
      font-size: 1.1rem; line-height: 1.9;
      color: var(--texto); white-space: pre-wrap;
    }

    .leitura-aclamacao {
      background: var(--aclamacao-bg);
      border: 1px solid var(--linha);
      border-left: 3px solid var(--ouro);
      padding: 1.2rem 1.5rem;
      font-style: italic; font-size: 1rem;
      color: var(--vinho); text-align: center;
      margin: .5rem 0 1.5rem; line-height: 1.7;
      transition: background .3s;
    }

    .evangelho-header { display: flex; align-items: center; gap: .8rem; margin-bottom: 1rem; }
    .evangelho-icone {
      width: 38px; height: 38px;
      background: var(--vinho); color: var(--ouro);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; border-radius: 50%; flex-shrink: 0;
    }

    .divisor {
      text-align: center; color: var(--ouro);
      font-size: 1.2rem; margin: 2.5rem 0;
      letter-spacing: .5rem; opacity: .5;
    }
    .fonte-link {
      text-align: center; font-family: 'Lato', sans-serif;
      font-size: .8rem; color: var(--cinza); margin-top: 1rem;
    }
    .fonte-link a { color: var(--vinho); }

    footer {
      text-align: center; padding: 2rem;
      border-top: 1px solid var(--linha);
      font-family: 'Lato', sans-serif; font-size: .75rem;
      color: var(--cinza); letter-spacing: .08em;
      transition: border-color .3s;
    }
    footer a { color: var(--vinho); text-decoration: none; }

    @media (max-width: 520px) {
      .data-bar { flex-direction: column; align-items: flex-start; }
      main { padding: 1.5rem 1rem 3rem; }
      .toggle-label { display: none; }
    }

    /* ══ BOTÃO INSTALAR PWA ══ */
    .btn-instalar-wrap {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 500;
    }
    #btn-instalar {
      display: none;
      align-items: center;
      gap: .6rem;
      background: var(--vinho);
      color: var(--ouro-claro);
      border: none;
      font-family: 'Lato', sans-serif;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .7rem 1.2rem;
      border-radius: 3px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
      transition: all .2s;
    }
    #btn-instalar:hover { opacity: .9; transform: translateY(-2px); }
    #btn-instalar .icone { font-size: 1.1rem; }

    /* ══ REFLEXÃO IA ══ */
    .reflexao-wrap {
      margin-top: 2.5rem;
      border-top: 1px solid var(--linha);
      padding-top: 2rem;
    }
    .reflexao-titulo {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--vinho);
      letter-spacing: .08em;
      margin-bottom: 1.2rem;
    }
    .reflexao-titulo .ia-badge {
      font-family: 'Lato', sans-serif;
      font-size: .6rem;
      letter-spacing: .15em;
      background: var(--ouro);
      color: #1a1008;
      padding: .15rem .45rem;
      border-radius: 2px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .btn-reflexao {
      display: flex;
      align-items: center;
      gap: .6rem;
      background: none;
      border: 1.5px solid var(--ouro);
      color: var(--ouro);
      font-family: 'Lato', sans-serif;
      font-size: .78rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .6rem 1.3rem;
      border-radius: 2px;
      cursor: pointer;
      transition: all .25s;
    }
    .btn-reflexao:hover {
      background: var(--ouro);
      color: #1a1008;
    }
    .btn-reflexao:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .btn-reflexao .spin {
      display: inline-block;
      animation: girar .8s linear infinite;
    }
    .reflexao-box {
      margin-top: 1.4rem;
      background: var(--aclamacao-bg);
      border: 1px solid var(--linha);
      border-left: 3px solid var(--ouro);
      padding: 1.5rem 1.8rem;
      border-radius: 0 4px 4px 0;
      animation: fadeUp .4s ease;
    }
    .reflexao-texto {
      font-size: 1.08rem;
      line-height: 2;
      color: var(--texto);
      white-space: pre-wrap;
    }
    .reflexao-texto .oracao {
      display: block;
      margin-top: 1rem;
      font-style: italic;
      color: var(--vinho);
      border-top: 1px solid var(--linha);
      padding-top: 1rem;
    }
    .reflexao-erro {
      margin-top: 1rem;
      font-family: 'Lato', sans-serif;
      font-size: .85rem;
      color: #c0392b;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="toggle-tema" onclick="alternarTema()" title="Alternar modo escuro">
    <span class="toggle-label" id="label-tema">ESCURO</span>
    <div class="toggle-switch"></div>
    <span class="toggle-icone" id="icone-tema">🌙</span>
  </div>
  <div class="header-inner">
    <p class="site-subtitle">† Palavra de Deus para hoje</p>
    <h1 class="site-title">Liturgia do Dia</h1>
    <p class="ornamento">✦ ✦ ✦</p>
  </div>
</header>

<!-- BARRA DE DATA -->
<div class="data-bar">
  <span class="data-texto" onclick="abrirCalendario()" title="Escolher outra data">
    📅 <span id="data-hoje"></span>
  </span>
  <nav class="nav-datas">
    <button id="btn-ontem"  onclick="irParaDia(-1)">← Ontem</button>
    <button id="btn-hoje"   onclick="irParaHoje()" class="ativo">Hoje</button>
    <button id="btn-amanha" onclick="irParaDia(1)">Amanhã →</button>
  </nav>
</div>

<!-- CONTEÚDO -->
<main id="conteudo">
  <div class="loading">
    <span class="loading-icone">✝</span>
    Buscando a liturgia do dia...
  </div>
</main>


<!-- BOTÃO INSTALAR -->
<div class="btn-instalar-wrap">
  <button id="btn-instalar" onclick="instalarApp()">
    <span class="icone">📲</span> Instalar App
  </button>
</div>

<!-- MODAL CALENDÁRIO -->
<div class="modal-overlay" id="modal-overlay" onclick="fecharSeOverlay(event)">
  <div class="modal-cal">
    <div class="cal-topo">
      <span class="cal-mes-ano" id="cal-mes-ano"></span>
      <div class="cal-nav">
        <button onclick="navegarCal(-1)">‹</button>
        <button onclick="navegarCal(1)">›</button>
      </div>
    </div>
    <div class="cal-selects">
      <select id="sel-mes" onchange="irParaMesAno()"></select>
      <select id="sel-ano" onchange="irParaMesAno()"></select>
    </div>
    <div class="cal-grid-header">
      <span>Dom</span><span>Seg</span><span>Ter</span>
      <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <button class="modal-fechar" onclick="fecharCalendario()">Fechar</button>
  </div>
</div>

<footer>
  Liturgia do Dia · Fonte: <a href="https://github.com/Dancrf/liturgia-diaria" target="_blank">API Liturgia Diária</a> · Feito com fé 🙏
</footer>

<script>
// ══ CONSTANTES ══
const MESES   = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                  'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS_SEM = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira',
                   'Quinta-feira','Sexta-feira','Sábado'];

// ══ ESTADO ══
const hojeRef = new Date();
hojeRef.setHours(0,0,0,0);

let dataSel = new Date(hojeRef);   // data exibida
let calMes  = hojeRef.getMonth();
let calAno  = hojeRef.getFullYear();

// ══ UTILITÁRIOS ══
function dataISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dataBR(d) {
  return `${DIAS_SEM[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
function mesmoDia(a,b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

// ══ MODO ESCURO ══
function alternarTema() {
  const escuro = document.documentElement.getAttribute('data-tema') === 'escuro';
  const novo   = escuro ? 'claro' : 'escuro';
  document.documentElement.setAttribute('data-tema', novo);
  document.getElementById('label-tema').textContent = escuro ? 'ESCURO' : 'CLARO';
  document.getElementById('icone-tema').textContent  = escuro ? '🌙' : '☀️';
  localStorage.setItem('liturgia-tema', novo);
}
function initTema() {
  const salvo = localStorage.getItem('liturgia-tema') || 'claro';
  document.documentElement.setAttribute('data-tema', salvo);
  document.getElementById('label-tema').textContent = salvo === 'escuro' ? 'CLARO'  : 'ESCURO';
  document.getElementById('icone-tema').textContent  = salvo === 'escuro' ? '☀️' : '🌙';
}

// ══ NAVEGAÇÃO RÁPIDA ══
function irParaDia(offset) {
  const d = new Date(hojeRef);
  d.setDate(hojeRef.getDate() + offset);
  irParaData(d);
}
function irParaHoje() { irParaData(new Date(hojeRef)); }

function irParaData(d) {
  dataSel = new Date(d); dataSel.setHours(0,0,0,0);
  document.getElementById('data-hoje').textContent = dataBR(dataSel);
  syncBotoes();
  carregarLiturgia();
}

function syncBotoes() {
  const ontem  = new Date(hojeRef); ontem.setDate(hojeRef.getDate()-1);
  const amanha = new Date(hojeRef); amanha.setDate(hojeRef.getDate()+1);
  document.getElementById('btn-ontem').classList.toggle('ativo',  mesmoDia(dataSel, ontem));
  document.getElementById('btn-hoje').classList.toggle('ativo',   mesmoDia(dataSel, hojeRef));
  document.getElementById('btn-amanha').classList.toggle('ativo', mesmoDia(dataSel, amanha));
}

// ══ CALENDÁRIO ══
function abrirCalendario() {
  calMes = dataSel.getMonth();
  calAno = dataSel.getFullYear();
  preencherSelects();
  renderCal();
  document.getElementById('modal-overlay').classList.add('aberto');
}
function fecharCalendario() {
  document.getElementById('modal-overlay').classList.remove('aberto');
}
function fecharSeOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) fecharCalendario();
}

function navegarCal(delta) {
  calMes += delta;
  if (calMes < 0)  { calMes = 11; calAno--; }
  if (calMes > 11) { calMes = 0;  calAno++; }
  syncSelects();
  renderCal();
}

function irParaMesAno() {
  calMes = parseInt(document.getElementById('sel-mes').value);
  calAno = parseInt(document.getElementById('sel-ano').value);
  renderCal();
}

function preencherSelects() {
  const sm = document.getElementById('sel-mes');
  sm.innerHTML = MESES.map((m,i)=>`<option value="${i}"${i===calMes?' selected':''}>${m}</option>`).join('');

  const sa = document.getElementById('sel-ano');
  const ay = new Date().getFullYear();
  let o='';
  for (let a=ay-5; a<=ay+5; a++) o+=`<option value="${a}"${a===calAno?' selected':''}>${a}</option>`;
  sa.innerHTML = o;
}

function syncSelects() {
  document.getElementById('sel-mes').value = calMes;
  document.getElementById('sel-ano').value = calAno;
}

function renderCal() {
  document.getElementById('cal-mes-ano').textContent = `${MESES[calMes]} ${calAno}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const inicio   = new Date(calAno, calMes, 1).getDay();
  const diasMes  = new Date(calAno, calMes+1, 0).getDate();

  for (let i=0; i<inicio; i++) {
    const c = document.createElement('div');
    c.className='cal-dia vazio'; grid.appendChild(c);
  }

  for (let d=1; d<=diasMes; d++) {
    const c = document.createElement('div');
    c.className = 'cal-dia';
    c.textContent = d;
    const dt = new Date(calAno, calMes, d);
    if (mesmoDia(dt, hojeRef))  c.classList.add('hoje');
    if (mesmoDia(dt, dataSel))  c.classList.add('selecionado');
    c.addEventListener('click', () => {
      fecharCalendario();
      irParaData(new Date(calAno, calMes, d));
    });
    grid.appendChild(c);
  }
}

// ══ RENDER LITURGIA ══
function mostrarLoading() {
  document.getElementById('conteudo').innerHTML = `
    <div class="loading"><span class="loading-icone">✝</span>Buscando a liturgia do dia...</div>`;
}
function mostrarErro(msg) {
  document.getElementById('conteudo').innerHTML = `
    <div class="erro-box">
      <h3>⚠️ Não foi possível carregar</h3>
      <p>${msg}</p>
      <p style="margin-top:.8rem">Verifique se o servidor está rodando e tente novamente.</p>
    </div>`;
}

function card(label, ref, texto, delay, evangelho=false) {
  return `
    <div class="leitura-card" style="animation-delay:${delay}s">
      ${evangelho ? `
        <div class="evangelho-header">
          <div class="evangelho-icone">✝</div>
          <div>
            <p class="leitura-label">${label}</p>
            ${ref ? `<p class="leitura-referencia">${ref}</p>` : ''}
          </div>
        </div>` : `
        <p class="leitura-label">${label}</p>
        ${ref ? `<p class="leitura-referencia">${ref}</p>` : ''}`}
      <p class="leitura-texto">${texto||''}</p>
    </div>`;
}

function renderLiturgia(dados) {
  const L = dados.liturgia;
  if (!L) { mostrarErro('Resposta da API inválida.'); return; }

  let html = `<div class="tempo-badge">🕊️ ${L.tipo||L.liturgia||'Liturgia do Dia'}</div>`;
  let d = 0;

  if (L.primeiraLeitura) {
    html += card('1ª Leitura', L.primeiraLeitura.referencia, L.primeiraLeitura.texto, d); d+=.1;
  }
  if (L.salmo) {
    const t = (L.salmo.refrao ? `Refrão: ${L.salmo.refrao}\n\n` : '') + (L.salmo.texto||'');
    html += card('Salmo Responsorial', L.salmo.referencia, t, d); d+=.1;
  }
  if (L.segundaLeitura) {
    html += card('2ª Leitura', L.segundaLeitura.referencia, L.segundaLeitura.texto, d); d+=.1;
  }
  if (L.aclamacao?.texto) {
    html += `<div class="leitura-aclamacao" style="animation-delay:${d}s">${L.aclamacao.texto}</div>`; d+=.1;
  }
  if (L.evangelho) {
    html += card('Evangelho', L.evangelho.referencia, L.evangelho.texto, d, true);
  }
  if (!L.primeiraLeitura && !L.evangelho) {
    html += `<div class="leitura-card"><p class="leitura-label">Leituras</p>
      <p class="leitura-texto">${JSON.stringify(L,null,2)}</p></div>`;
  }

  html += `
    <div class="reflexao-wrap">
      <div class="reflexao-titulo">
        ✦ Reflexão do Dia
        <span class="ia-badge">IA</span>
      </div>
      <button class="btn-reflexao" id="btn-reflexao" onclick="gerarReflexao()">
        <span id="reflexao-btn-icone">✨</span> Gerar Reflexão com IA
      </button>
      <div id="reflexao-conteudo"></div>
    </div>`;
  html += `<div class="divisor">✦ ✦ ✦</div>
    <p class="fonte-link">Fonte: <a href="https://github.com/Dancrf/liturgia-diaria" target="_blank">API Liturgia Diária (open source)</a></p>`;

  document.getElementById('conteudo').innerHTML = html;
}

async function carregarLiturgia() {
  mostrarLoading();
  try {
    const r = await fetch(`/api/liturgia?data=${dataISO(dataSel)}`);
    const dados = await r.json();
    if (!dados.sucesso) { mostrarErro(dados.erro||'Erro desconhecido.'); return; }
    renderLiturgia(dados);
  } catch(e) {
    mostrarErro('Não foi possível conectar com o servidor. ' + e.message);
  }
}

// ══ PWA — BOTÃO DE INSTALAÇÃO ══
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('btn-instalar').style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  document.getElementById('btn-instalar').style.display = 'none';
  deferredPrompt = null;
});

async function instalarApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('btn-instalar').style.display = 'none';
  }
  deferredPrompt = null;
}


// ══ REFLEXÃO COM IA ══
// Guarda as leituras após carregar para usar na reflexão
let liturgiaAtual = null;

// Intercepta renderLiturgia para salvar dados
const _renderOriginal = renderLiturgia;
function renderLiturgia(dados) {
  liturgiaAtual = dados.liturgia;
  _renderOriginal(dados);
}

async function gerarReflexao() {
  if (!liturgiaAtual) return;

  const btn  = document.getElementById('btn-reflexao');
  const icone = document.getElementById('reflexao-btn-icone');
  const box  = document.getElementById('reflexao-conteudo');

  btn.disabled = true;
  icone.textContent = '⏳';
  icone.classList.add('spin');
  box.innerHTML = '';

  try {
    const resp = await fetch('/api/reflexao', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        evangelho:       liturgiaAtual.evangelho,
        primeiraLeitura: liturgiaAtual.primeiraLeitura,
        salmo:           liturgiaAtual.salmo,
        data:            dataISO(dataSel)
      })
    });

    const dados = await resp.json();

    if (!dados.sucesso) {
      box.innerHTML = `<p class="reflexao-erro">⚠️ ${dados.erro}</p>`;
      return;
    }

    box.innerHTML = `
      <div class="reflexao-box">
        <p class="reflexao-texto">${dados.reflexao.replace(/\n/g, '<br>')}</p>
      </div>`;

    // Troca o botão para "Gerar novamente"
    btn.innerHTML = '<span>🔄</span> Gerar nova reflexão';

  } catch(e) {
    box.innerHTML = `<p class="reflexao-erro">⚠️ Erro de conexão: ${e.message}</p>`;
  } finally {
    btn.disabled = false;
    icone.classList.remove('spin');
  }
}

initTema();
document.getElementById('data-hoje').textContent = dataBR(dataSel);
syncBotoes();
carregarLiturgia();
